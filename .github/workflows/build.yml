name: Build ArchiveTune

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - distribution: gms
            device: mobile
            abi: universal
          - distribution: gms
            device: mobile
            abi: arm64
          - distribution: gms
            device: mobile
            abi: armeabi

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Resolve task
        id: task
        run: |
          DIST="${{ matrix.distribution }}"
          DEV="${{ matrix.device }}"
          ABI="${{ matrix.abi }}"

          CAP_DEV="$(tr '[:lower:]' '[:upper:]' <<< ${DEV:0:1})${DEV:1}"
          CAP_ABI="$(tr '[:lower:]' '[:upper:]' <<< ${ABI:0:1})${ABI:1}"

          echo "TASK=assemble${DIST^}${CAP_DEV}${CAP_ABI}Release" >> $GITHUB_ENV

      - name: Build
        run: ./gradlew $TASK

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.distribution }}-${{ matrix.device }}-${{ matrix.abi }}
          path: app/build/outputs/apk/**/release/*.apk
