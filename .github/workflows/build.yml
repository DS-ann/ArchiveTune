name: Build & Artifact Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      # ================= Checkout =================
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ================= Java Setup =================
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ================= Make Gradle Executable =================
      - name: Make Gradlew Executable
        run: chmod +x gradlew

      # ================= Build APK =================
      - name: Build Debug APK
        run: ./gradlew assembleDebug --parallel --daemon

      # ================= Prepare Deploy Folder =================
      - name: Prepare deploy folder
        run: |
          mkdir -p deploy
          cp app/build/outputs/apk/debug/*.apk deploy/


      # ================= Upload Artifacts =================
      - name: Upload APKs & index.html as artifact
        uses: actions/upload-artifact@v4
        with:
          name: RanjanaSmartHome-APK
          path: deploy/
